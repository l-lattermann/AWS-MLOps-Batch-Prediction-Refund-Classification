dataset:
  id: clothing_dataset_small
  version: v1
  train_dir: train
  validation_dir: validation
  test_dir: test

model:
  version: model_v1
  architecture: mobilenet_v3_large
  image_size: 224
  pretrained: true

training:
  epochs: 5
  batch_size: 32
  learning_rate: 0.001

output:
  model_path: /tmp/model_v1.pth
  metadata_path: /tmp/model_v1_metadata.json