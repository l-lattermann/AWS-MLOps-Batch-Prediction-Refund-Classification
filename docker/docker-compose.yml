services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ~/.aws:/root/.aws:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  train:
    build:
      context: ..
      dockerfile: docker/Dockerfile.train
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ~/.aws:/root/.aws:ro
    command: python -m ml.train

  batch:
    build:
      context: ..
      dockerfile: docker/Dockerfile.batch
    env_file:
      - ../.env
    volumes:
      - ..:/app
      - ~/.aws:/root/.aws:ro
    command: python -m ml.batch_predict